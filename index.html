<!DOCTYPE html>
<html>
<head>
    <title>SIT210 - Linda's Care Portal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 40px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 1.5rem; }
        .light-control { border-bottom: 1px solid #eee; padding: 20px 0; display: flex; flex-direction: column; align-items: center; }
        .light-control:last-child { border-bottom: none; }
        h3 { margin-bottom: 15px; font-size: 1.1rem; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-on { background-color: #2ecc71; color: white; }
        .btn-off { background-color: #e74c3c; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        .status { margin-top: 12px; font-size: 0.9rem; color: #7f8c8d; }
        #log { margin-top: 20px; font-size: 0.8rem; color: #95a5a6; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>Linda's House Control</h1>

    <div class="light-control">
        <h3>Living Room Light</h3>
        <div class="btn-group">
            <button class="btn-on" onclick="toggleLight('livingRoom_Light', true)">ON</button>
            <button class="btn-off" onclick="toggleLight('livingRoom_Light', false)">OFF</button>
        </div>
        <p class="status">Status: <span id="livingRoom_Light_status">...</span></p>
    </div>

    <div class="light-control">
        <h3>Bathroom Light</h3>
        <div class="btn-group">
            <button class="btn-on" onclick="toggleLight('bathroom_Light', true)">ON</button>
            <button class="btn-off" onclick="toggleLight('bathroom_Light', false)">OFF</button>
        </div>
        <p class="status">Status: <span id="bathroom_Light_status">...</span></p>
    </div>

    <div class="light-control">
        <h3>Closet Light</h3>
        <div class="btn-group">
            <button class="btn-on" onclick="toggleLight('closet_Light', true)">ON</button>
            <button class="btn-off" onclick="toggleLight('closet_Light', false)">OFF</button>
        </div>
        <p class="status">Status: <span id="closet_Light_status">...</span></p>
    </div>

    <div id="log">Waiting for connection...</div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    // UPDATED CONFIGURATION
    const firebaseConfig = {
      apiKey: "AIzaSyBPfIHt8Ufaxzp9CENM4hnPk3ITMv9auZo",
      authDomain: "sit210-task-4-2d.firebaseapp.com",
      projectId: "sit210-task-4-2d",
      // CRITICAL: The Singapore region must be specified in the URL
      databaseURL: "sit210-task-4-2d-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function toggleLight(room, state) {
        document.getElementById('log').innerText = `Sending command to ${room}...`;
        
        // We write to 'lights/room_Name' to match your Arduino code
        database.ref(`lights/${room}`).set(state)
            .then(() => {
                document.getElementById('log').innerText = "Command Sent Successfully";
            })
            .catch((error) => {
                document.getElementById('log').innerText = "Error: " + error.message;
            });
    }

    function listenForLightChanges(room) {
        const lightRef = database.ref(`lights/${room}`);
        lightRef.on('value', (snapshot) => {
            const isLightOn = snapshot.val();
            const statusElement = document.getElementById(`${room}_status`);
            if (statusElement) {
                statusElement.textContent = isLightOn ? 'ON' : 'OFF';
                statusElement.style.color = isLightOn ? '#2ecc71' : '#e74c3c';
            }
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        listenForLightChanges('livingRoom_Light');
        listenForLightChanges('bathroom_Light');
        listenForLightChanges('closet_Light');
        document.getElementById('log').innerText = "System Connected to Singapore Node";
    });
</script>

</body>
</html>
